<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-label="micro:bit Playground flyer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <g font-family="Orbitron, system-ui, sans-serif" text-anchor="middle">
    <text x="600" y="220" font-size="96" font-weight="900" fill="url(#title)">micro:bit</text>
    <text x="600" y="340" font-size="96" font-weight="900" fill="url(#title)">Playground</text>
    <text x="600" y="420" font-size="36" fill="#94a3b8" letter-spacing="6">CONNECT • EXPLORE • CREATE • PLAY</text>
  </g>

  <g transform="translate(400,520)">
    <rect width="400" height="400" rx="40" fill="#020617" stroke="#22c55e" stroke-width="6"/>
    <g fill="#ef4444">
      <circle cx="80"  cy="80"  r="22"/><circle cx="160" cy="80"  r="22"/><circle cx="240" cy="80"  r="22"/><circle cx="320" cy="80"  r="22"/>
      <circle cx="80"  cy="160" r="22"/><circle cx="160" cy="160" r="22"/><circle cx="240" cy="160" r="22"/><circle cx="320" cy="160" r="22"/>
      <circle cx="80"  cy="240" r="22"/><circle cx="160" cy="240" r="22"/><circle cx="240" cy="240" r="22"/><circle cx="320" cy="240" r="22"/>
      <circle cx="80"  cy="320" r="22"/><circle cx="160" cy="320" r="22"/><circle cx="240" cy="320" r="22"/><circle cx="320" cy="320" r="22"/>
    </g>
  </g>

  <g font-family="Inter, system-ui, sans-serif" fill="#e2e8f0" text-anchor="middle">
    <text x="600" y="1020" font-size="42" font-weight="700">8 tabs · live sensors · 2 servos · 3D board</text>
    <text x="600" y="1080" font-size="32" fill="#94a3b8">BLE pairing · Chart.js graph · simulate mode</text>
    <text x="600" y="1180" font-size="28" fill="#22c55e">🟢 No install · No account · Runs in your browser</text>
    <text x="600" y="1240" font-size="26" fill="#22d3ee">🌍 English · Français · العربية</text>
  </g>

  <g transform="translate(600,1400)" text-anchor="middle" font-family="Inter, system-ui, sans-serif">
    <text y="0" font-size="28" fill="#cbd5e1" font-weight="700">workshop-diy</text>
    <text y="40" font-size="20" fill="#64748b">Chrome/Edge · BBC micro:bit V2</text>
  </g>
</svg>
